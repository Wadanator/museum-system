substitutions:
  # ==========================================================
  # HLAVNÁ KONFIGURÁCIA ZARIADENIA (Modulárna časť)
  # ==========================================================
  room_name: "room1"                          # Prefix pre MQTT (napr. room1, room2)
  dev_name: "esp32-relaymodule-room1"         # Hostname v sieti
  friendly_name: "Room1_Relays_Ctrl"          # Zobrazene meno (pre OTA a MQTT Status)

  wifi_ssid: "Museum-Room1"
  wifi_pass: "88888888"
  
  mqtt_broker: "TechMuzeumRoom1.local"
  mqtt_port: "1883"
  
  # Konfiguracia Hardware
  i2c_sda: "42"
  i2c_scl: "41"
  i2c_addr: "0x20"
  
  # Timeout bez prikazu v sekundach (180s v originalnom kode)
  idle_timeout_s: "180"

esphome:
  name: ${dev_name}
  friendly_name: ${friendly_name}
  project:
    name: "museum.relay_controller"
    version: "2.3.yaml"
  # Volana pri starte (reset timeru)
  on_boot:
    priority: -10
    then:
      - globals.set:
          id: last_cmd_time
          value: 'millis()'

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_pass}
  ap:
    ssid: "${dev_name}-fallback"
    password: "fallback_password"

ota:
  - platform: esphome
    password: ${room_name}

logger:
  level: DEBUG

i2c:
  sda: ${i2c_sda}
  scl: ${i2c_scl}
  scan: true
  id: i2c_bus

pcf8574:
  - id: 'pcf8574_hub'
    address: ${i2c_addr}
    pcf8575: false

globals:
  - id: last_cmd_time
    type: uint32_t
    initial_value: '0'

# ==========================================================
# SKRIPTY (Efekty a Failsafe)
# ==========================================================
script:
  - id: turn_off_all
    then:
      - switch.turn_off: dev_power_smoke_on
      - switch.turn_off: dev_light_fire
      - switch.turn_off: dev_light_1
      - switch.turn_off: dev_effect_smoke
      - switch.turn_off: dev_light_2
      - switch.turn_off: dev_light_3
      - switch.turn_off: dev_light_4
      - switch.turn_off: dev_light_5
      - script.stop: effect_group1
      - script.stop: effect_alone

  - id: effect_group1
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            # ON
            - lambda: |-
                id(dev_light_4).turn_on();
                id(dev_light_5).turn_on();
            - delay: !lambda "return random(75, 500);"
            # OFF
            - lambda: |-
                id(dev_light_4).turn_off();
                id(dev_light_5).turn_off();
            - delay: !lambda "return random(150, 1500);"

  - id: effect_alone
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - switch.turn_on: dev_light_1
            - delay: !lambda "return random(60, 100);"
            - switch.turn_off: dev_light_1
            - delay: !lambda "return random(2000, 5000);"

# ==========================================================
# DEFINÍCIA ZARIADENÍ (Zhodné polohu s poľom DEVICES[])
# ==========================================================
switch:
  - platform: pcf8574
    id: dev_power_smoke_on
    pin: { pcf8574: pcf8574_hub, number: 0, inverted: false }

  - platform: pcf8574
    id: dev_light_fire
    pin: { pcf8574: pcf8574_hub, number: 1, inverted: false }

  - platform: pcf8574
    id: dev_light_1
    pin: { pcf8574: pcf8574_hub, number: 2, inverted: false }

  - platform: pcf8574
    id: dev_effect_smoke
    pin: { pcf8574: pcf8574_hub, number: 3, inverted: false }
    on_turn_on:
      - delay: 12s  # AutoOffMs = 12000 z C++ configu
      - switch.turn_off: dev_effect_smoke

  - platform: pcf8574
    id: dev_light_2
    pin: { pcf8574: pcf8574_hub, number: 4, inverted: false }

  - platform: pcf8574
    id: dev_light_3
    pin: { pcf8574: pcf8574_hub, number: 5, inverted: false }

  - platform: pcf8574
    id: dev_light_4
    pin: { pcf8574: pcf8574_hub, number: 6, inverted: false }

  - platform: pcf8574
    id: dev_light_5
    pin: { pcf8574: pcf8574_hub, number: 7, inverted: false }

# ==========================================================
# MQTT MANAGMENT (1:1 VLASTNÉ TOPICY A FEEDBACK)
# ==========================================================
mqtt:
  broker: ${mqtt_broker}
  port: ${mqtt_port}
  client_id: ${friendly_name}
  keepalive: 5s
  
  # Status (ako v C++ -> devices/Room1_Relays_Ctrl/status)
  birth_message:
    topic: devices/${friendly_name}/status
    payload: online
  will_message:
    topic: devices/${friendly_name}/status
    payload: offline

  # Reconnect logika z connection_monitor.cpp
  on_disconnect:
    then:
      - script.execute: turn_off_all

  # Prijímanie správ
  on_message:
    - topic: ${room_name}/STOP
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - script.execute: turn_off_all
        - mqtt.publish: { topic: "${room_name}/STOP/feedback", payload: "OK" }

    # EFEKTY
    - topic: ${room_name}/effects/group1
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1" || x == "START") {
              id(effect_group1).execute();
              id(mqtt_client).publish("${room_name}/effects/group1/feedback", "ACTIVE");
            } else if (x == "OFF" || x == "0" || x == "STOP") {
              id(effect_group1).stop();
              id(dev_light_4).turn_off();
              id(dev_light_5).turn_off();
              id(mqtt_client).publish("${room_name}/effects/group1/feedback", "INACTIVE");
            }
    
    - topic: ${room_name}/effects/alone
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1" || x == "START") {
              id(effect_alone).execute();
              id(mqtt_client).publish("${room_name}/effects/alone/feedback", "ACTIVE");
            } else if (x == "OFF" || x == "0" || x == "STOP") {
              id(effect_alone).stop();
              id(dev_light_1).turn_off();
              id(mqtt_client).publish("${room_name}/effects/alone/feedback", "INACTIVE");
            }

    # ZARIADENIA
    - topic: ${room_name}/power/smoke_ON
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1") { id(dev_power_smoke_on).turn_on(); id(mqtt_client).publish("${room_name}/power/smoke_ON/feedback", "OK"); }
            else if (x == "OFF" || x == "0") { id(dev_power_smoke_on).turn_off(); id(mqtt_client).publish("${room_name}/power/smoke_ON/feedback", "OK"); }

    - topic: ${room_name}/light/fire
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1") { id(dev_light_fire).turn_on(); id(mqtt_client).publish("${room_name}/light/fire/feedback", "OK"); }
            else if (x == "OFF" || x == "0") { id(dev_light_fire).turn_off(); id(mqtt_client).publish("${room_name}/light/fire/feedback", "OK"); }

    - topic: ${room_name}/light/1
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1") { id(dev_light_1).turn_on(); id(mqtt_client).publish("${room_name}/light/1/feedback", "OK"); }
            else if (x == "OFF" || x == "0") { id(dev_light_1).turn_off(); id(mqtt_client).publish("${room_name}/light/1/feedback", "OK"); }

    - topic: ${room_name}/effect/smoke
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1") { id(dev_effect_smoke).turn_on(); id(mqtt_client).publish("${room_name}/effect/smoke/feedback", "OK"); }
            else if (x == "OFF" || x == "0") { id(dev_effect_smoke).turn_off(); id(mqtt_client).publish("${room_name}/effect/smoke/feedback", "OK"); }

    - topic: ${room_name}/light/2
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1") { id(dev_light_2).turn_on(); id(mqtt_client).publish("${room_name}/light/2/feedback", "OK"); }
            else if (x == "OFF" || x == "0") { id(dev_light_2).turn_off(); id(mqtt_client).publish("${room_name}/light/2/feedback", "OK"); }

    - topic: ${room_name}/light/3
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1") { id(dev_light_3).turn_on(); id(mqtt_client).publish("${room_name}/light/3/feedback", "OK"); }
            else if (x == "OFF" || x == "0") { id(dev_light_3).turn_off(); id(mqtt_client).publish("${room_name}/light/3/feedback", "OK"); }

    - topic: ${room_name}/light/4
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1") { id(dev_light_4).turn_on(); id(mqtt_client).publish("${room_name}/light/4/feedback", "OK"); }
            else if (x == "OFF" || x == "0") { id(dev_light_4).turn_off(); id(mqtt_client).publish("${room_name}/light/4/feedback", "OK"); }

    - topic: ${room_name}/light/5
      then:
        - globals.set: { id: last_cmd_time, value: 'millis()' }
        - lambda: |-
            if (x == "ON" || x == "1") { id(dev_light_5).turn_on(); id(mqtt_client).publish("${room_name}/light/5/feedback", "OK"); }
            else if (x == "OFF" || x == "0") { id(dev_light_5).turn_off(); id(mqtt_client).publish("${room_name}/light/5/feedback", "OK"); }

# ==========================================================
# TIMEOUT (Inactivity check)
# ==========================================================
interval:
  - interval: 10s
    then:
      - lambda: |-
          if (id(last_cmd_time) != 0 && (millis() - id(last_cmd_time) > (atoi("${idle_timeout_s}") * 1000))) {
            id(turn_off_all).execute();
            id(last_cmd_time) = 0; // reset
          }
