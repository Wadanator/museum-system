substitutions:
  device_name: esp32-room1-trigger
  friendly_name: "Room1 ESP Trigger"
  room_prefix: "room1"
  client_id: "Room1_ESP_Trigger"
  ota_password: "room1"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - logger.log: "=== ESP32 Scene Trigger Ready ==="

esp32:
  board: esp32dev
  framework:
    type: arduino

# ─── LOGGING ─────────────────────────────────────────────────────────────────
logger:
  level: DEBUG
  baud_rate: 115200

# ─── OTA ─────────────────────────────────────────────────────────────────────
ota:
  - platform: esphome
    password: "${ota_password}"

# ─── WIFI ────────────────────────────────────────────────────────────────────
wifi:
  ssid: "Museum-Room1"
  password: "88888888"
  power_save_mode: none

  ap:
    ssid: "${device_name}-fallback"
    password: "fallback1234"

captive_portal:

# ─── MQTT ────────────────────────────────────────────────────────────────────
mqtt:
  broker: TechMuzeumRoom1.local
  port: 1883
  client_id: "${client_id}"
  keepalive: 15s

  birth_message:
    topic: "devices/${client_id}/status"
    payload: "online"
    retain: true
  will_message:
    topic: "devices/${client_id}/status"
    payload: "offline"
    retain: true
  shutdown_message:
    topic: "devices/${client_id}/status"
    payload: "offline"
    retain: true

  on_connect:
    then:
      - mqtt.publish:
          topic: "devices/${client_id}/status"
          payload: "online"
          retain: true

# ─── BUTTON – GPIO32 ─────────────────────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO32
      mode:
        input: true
      inverted: true
    name: "Scene Trigger Button"
    id: scene_button
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    on_press:
      then:
        - script.execute: button_cooldown_script

# ─── COOLDOWN SCRIPT ─────────────────────────────────────────────────────────
script:
  - id: button_cooldown_script
    mode: single
    then:
      - logger.log: "Button: PRESSED (Valid) – sending MQTT trigger"
      - mqtt.publish:
          topic: "${room_prefix}/scene"
          payload: "START"
          retain: false
      - logger.log: ">>> SCENE TRIGGER SENT: ${room_prefix}/scene -> START"
      - delay: 4000ms

# ─── STATUS PUBLISH každých 15s ──────────────────────────────────────────────
interval:
  - interval: 15s
    then:
      - if:
          condition:
            mqtt.connected:
          then:
            - mqtt.publish:
                topic: "devices/${client_id}/status"
                payload: "online"
                retain: true

# ─── DIAGNOSTIKA ─────────────────────────────────────────────────────────────
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"